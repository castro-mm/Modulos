<div class="container-fluid">
    <app-breadcrumb/>
    <p-panel header="Filtros de Pesquisa" [toggleable]="true" [collapsed]="true" class="mb-4">
        <form [formGroup]="form" (submit)="listar()" #f>
            <p-divider class="mt-1" />
            <div class="row mt-2">
                <div class="col-4">
                    <label for="nomeCompleto" class="mb-1">Nome:</label>
                    <input 
                        id="nomeCompleto" 
                        formControlName="nomeCompleto" 
                        pInputText 
                        autofocus 
                        fluid />
                </div>
            </div>
            <div class="row mt-2">
                <div class="col-4">
                    <label for="email" class="mb-1">E-mail:</label>
                    <input 
                        id="email" 
                        formControlName="email" 
                        pInputText 
                        fluid />
                </div>
            </div>
            <p-divider class="mt-3" />
            <div class="row mt-3">
                <div class="col-12 text-end mt-1">
                    <p-button 
                        icon="pi pi-times" 
                        label="Limpar" 
                        severity="secondary" 
                        class="me-2" 
                        text 
                        (click)="f.reset()"/>
                    <p-button 
                        icon="pi pi-search" 
                        [loading]="isLoading" 
                        [label]="isLoading ? 'Executando...': 'Pesquisar'" 
                        severity="success" 
                        type="submit"/>
                </div>
            </div>
        </form>
    </p-panel>

    <p-table
        #dt
        [value]="usuarios()"
        [rows]="10"
        [paginator]="true"
        [globalFilterFields]="['id', 'nomeCompleto', 'email', 'role']"
        [rowHover]="true"
        dataKey="id"
        currentPageReportTemplate="{first} até {last} de {totalRecords} registros"
        [showCurrentPageReport]="true"
        [rowsPerPageOptions]="[10, 20, 30]"
        size="small"
        [loading]="isLoading"
        [loadingIcon]="'pi pi-spinner pi-spin'"
    >
        <ng-template #caption>
            <div class="flex items-center justify-end">
                <p-iconfield>
                    <p-inputicon class="pi pi-search" />
                    <input pInputText type="text" (input)="onGlobalFilter(dt, $event)" placeholder="Pesquisar..." />
                </p-iconfield>
            </div>
        </ng-template>
        <ng-template #header>
            <tr>
                <th style="min-width: 2rem; background-color: #f8f9fa" pSortableColumn="id"># <p-sortIcon field="id" /></th>
                <th style="min-width: 14rem; background-color: #f8f9fa" pSortableColumn="nomeCompleto">Nome Completo <p-sortIcon field="nomeCompleto" /></th>
                <th style="min-width: 14rem; background-color: #f8f9fa" pSortableColumn="email">E-mail <p-sortIcon field="email" /></th>
                <th style="min-width: 5rem; text-align: center; background-color: #f8f9fa" pSortableColumn="isActive">Ativo <p-sortIcon field="isActive" /></th>
                <th style="min-width: 5rem; text-align: center; background-color: #f8f9fa" pSortableColumn="emailConfirmed">Confirmação <p-sortIcon field="emailConfirmed" /></th>
                <th style="min-width: 5rem; text-align: center; background-color: #f8f9fa" pSortableColumn="role">Perfil <p-sortIcon field="role" /></th>
                <th style="min-width: 10rem; background-color: #f8f9fa" pSortableColumn="dataDeCriacao">Data de Criação <p-sortIcon field="dataDeCriacao" /></th>
                <th style="min-width: 10rem; background-color: #f8f9fa" pSortableColumn="dataDeAtualizacao">Data de Atualização <p-sortIcon field="dataDeAtualizacao" /></th>
                <th style="min-width: 12rem; background-color: #f8f9fa"></th>
            </tr>
        </ng-template>
        <ng-template #body let-user>
            <tr>
                <td>{{ user.id }}</td>
                <td>{{ user.nomeCompleto }}</td>
                <td>{{ user.email }}</td>
                <td style="text-align: center">
                    <p-tag [value]="user.isActive ? 'Sim' : 'Não'" [severity]="user.isActive ? 'success' : 'danger'" />
                </td>
                <td style="text-align: center">
                    <p-tag [value]="user.emailConfirmed ? 'Confirmado' : 'Pendente'" [severity]="user.emailConfirmed ? 'success' : 'warn'" />
                </td>
                <td style="text-align: center">
                    <p-tag [value]="user.role" [severity]="user.role === 'Admin' ? 'contrast' : 'info'" />
                </td>
                <td>{{ user.dataDeCriacao | date: 'dd/MM/yyyy HH:mm:ss' }}</td>
                <td>{{ user.dataDeAtualizacao | date: 'dd/MM/yyyy HH:mm:ss' }}</td>
                <td style="text-align: right">
                    <p-button icon="pi pi-pencil" class="mr-2" outlined (click)="openDialog(user)" pTooltip="Editar" />
                    <p-button 
                        [icon]="user.isActive ? 'pi pi-ban' : 'pi pi-check-circle'" 
                        [severity]="user.isActive ? 'warn' : 'success'" 
                        class="mr-2" 
                        outlined 
                        (click)="toggleStatus(user)" 
                        [pTooltip]="user.isActive ? 'Desativar' : 'Ativar'" />
                    <p-button icon="pi pi-key" severity="info" class="mr-2" outlined (click)="resetarSenha(user)" pTooltip="Resetar Senha" />
                    <p-button icon="pi pi-trash" severity="danger" outlined (click)="excluir(user)" pTooltip="Excluir" />
                </td>
            </tr>
        </ng-template>
    </p-table>
</div>
