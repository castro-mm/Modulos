<div class="container-fluid">
    <form #f [formGroup]="form" (submit)="salvar()">
        <p-divider class="mt-1" />

        @for (error of errorMessages; track $index) {
            <p-message severity="error" [text]="error" styleClass="mb-2 w-full" />
        }
        @if (successMessage) {
            <p-message severity="success" [text]="successMessage" styleClass="mb-2 w-full" />
        }

        <div class="row mt-2">
            <div class="col-12">
                <label for="nomeCompleto" class="mb-1">Nome Completo:</label>
                <input 
                    id="nomeCompleto" 
                    formControlName="nomeCompleto" 
                    pInputText 
                    autofocus 
                    fluid />
                <app-field-validation-message [control]="form.get('nomeCompleto')" [label]="'Nome Completo'" />
            </div>
        </div>
        <div class="row mt-2">
            <div class="col-12">
                <label for="email" class="mb-1">E-mail:</label>
                <input 
                    id="email" 
                    formControlName="email" 
                    pInputText 
                    fluid />
                <app-field-validation-message [control]="form.get('email')" [label]="'E-mail'" />
            </div>
        </div>
        <div class="row mt-2">
            <div class="col-6">
                <label for="role" class="mb-1">Perfil:</label>
                <p-select 
                    formControlName="role" 
                    inputId="role" 
                    [options]="roleOptions"
                    optionLabel="label" 
                    optionValue="value" 
                    appendTo="body"
                    placeholder="Selecione..."
                    fluid />
                <app-field-validation-message [control]="form.get('role')" [label]="'Perfil'" />
            </div>
            <div class="col-6">
                <label for="isActive" class="mb-1">Status:</label>
                <div class="mt-2">
                    <p-toggleButton 
                        formControlName="isActive" 
                        onLabel="Ativo" 
                        offLabel="Inativo" 
                        onIcon="pi pi-check" 
                        offIcon="pi pi-times" />
                </div>
            </div>
        </div>

        @if (entity) {
            <p-divider class="mt-3" />
            <div class="row mt-2">
                <div class="col-12 flex gap-2">
                    <p-button 
                        icon="pi pi-key" 
                        label="Resetar Senha" 
                        severity="info" 
                        outlined
                        (click)="resetarSenha()" />
                    <p-button 
                        icon="pi pi-trash" 
                        label="Excluir Usuário" 
                        severity="danger" 
                        outlined
                        (click)="excluir()" />
                </div>
            </div>
        }

        <p-divider class="mt-3" />
        <div class="row mt-2">
            <div class="col-12 text-end">
                <p-button 
                    icon="pi pi-times" 
                    label="Fechar" 
                    class="me-2" 
                    text 
                    (click)="closeDialog()"/>
                <p-button 
                    icon="pi pi-check" 
                    [label]="isLoading ? 'Executando...' : 'Salvar'" 
                    [loading]="isLoading" 
                    type="submit" 
                    [disabled]="form.invalid || isLoading"/>
            </div>
        </div>
    </form>
</div>
