<div class="container-fluid">
    <form #f [formGroup]="form" (submit)="salvar()">
        <p-divider class="mt-1" />
        <div class="row mt-2">
            <div class="col-12 col-lg-8">
                <label for="nome" class="mb-1">{{fieldsLabels['nome']}}</label>
                <input 
                    id="nome" 
                    formControlName="nome" 
                    pInputText 
                    autofocus 
                    fluid />
                <app-field-validation-message [control]="form.get('nome')" [label]="fieldsLabels['nome']" />
            </div>
        </div>
        <div class="row mt-2">
            <div class="col-12 col-lg-8">
                <label for="email" class="mb-1">{{fieldsLabels['email']}}</label>
                <input 
                    id="email" 
                    type="email"
                    formControlName="email" 
                    pInputText 
                    fluid />
                <app-field-validation-message [control]="form.get('email')" [label]="fieldsLabels['email']" />
            </div>
        </div>
        <div class="row mt-2">
            <div class="col-12 col-md-6 col-lg-4">
                <label for="cpf" class="mb-1">{{fieldsLabels['cpf']}}</label>
                <input 
                    id="cpf" 
                    formControlName="cpf" 
                    pInputText 
                    mask="000.000.000-00" 
                    [showMaskTyped]="true" 
                    [dropSpecialCharacters]="true"
                    [validation]="true"
                    fluid />
                <app-field-validation-message [control]="form.get('cpf')" [label]="fieldsLabels['cpf']" />
            </div>
        </div>
        <p-divider class="mt-3" />
        <div class="row mt-2">
            <div class="col-12 text-end">
                <div class="flex flex-wrap justify-end gap-2">
                    <p-button 
                        icon="pi pi-times" 
                        label="Fechar" 
                        text 
                        (click)="closeDialog()"/>
                    <p-button 
                        icon="pi pi-check" 
                        [label]="isLoading ? 'Executando...' : 'Salvar'" 
                        [loading]="isLoading" 
                        type="submit" 
                        [disabled]="form.invalid || isLoading"/>
                </div>
            </div>    
        </div>
    </form>
</div>
